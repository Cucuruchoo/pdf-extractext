services:
  app:
    build: .
    image: pdf-extractext-api:1.0.0
    container_name: pdf-documents-api
    ports:
      - "8000:8000"
    environment:
      APP_VERSION: "1.0.0"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: pdf_documents
      MAX_PDF_SIZE_MB: 10
      LOG_LEVEL: INFO
      SUMMARY_PROVIDER: local
      ENABLE_TEXT_SUMMARY: "true"
      TZ: America/Argentina/Buenos_Aires
    depends_on:
      - mongo

  mongo:
    image: mongo:4.4
    container_name: mongo-pdf-api
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      TZ: America/Argentina/Buenos_Aires

volumes:
  mongo_data:
